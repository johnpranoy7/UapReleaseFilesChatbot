spring.application.name=uapReleaseFilesChatbot
spring.profiles.active=dev
# Load key=value pairs from project-root .env (Spring Boot does not read .env by default)
spring.config.import=optional:file:.env[.properties]

chat.memory.cleanup.enabled=true
chat.memory.cleanup.retention-days=2
chat.memory.cleanup.cron=0 0 23 * * *
