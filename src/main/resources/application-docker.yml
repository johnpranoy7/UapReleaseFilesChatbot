spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:postgresql://postgres:5432/uap_chatbot
    username: root
    password: toor
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.1
          max-tokens: 1000
      embedding:
        options:
          model: text-embedding-3-small
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    vectorstore:
      pgvector:
        initialize-schema: true
        distance-type: COSINE_DISTANCE
        dimensions: 1536

nasa:
  api:
    url: https://api.nasa.gov/planetary/apod
  api-key: ${NASA_API_KEY:DEMO_KEY}

server:
  port: 8080
